active_provider = "anthropic"

[profile]
name = "coding-local"

[providers.anthropic]
provider = "anthropic"
model = "claude-sonnet-4-20250514"
stream = true
api_key_env = "ANTHROPIC_API_KEY"
base_url = "https://api.anthropic.com"
auth = "x-api-key"
api_version = "2023-06-01"

[modules]
# Provided by the coding-workflow plugin installed by ./install.sh.
workflow = "coding.plan_execute_review"
# Provided by the rg-search plugin installed by ./install.sh.
search = "rg"
memory = "none"
memory_policy = "none"
context = "repo_aware"
policy = "ask_write"
# Provided by the direct-patch plugin installed by ./install.sh.
patch = "direct"
compactor = "none"
tool_exposure = "all_visible"
renderer = "statusline"

[tools]
# Full local coding toolset. File I/O comes from file-tools, shell comes from
# shell-tool, and search/apply_patch/remember_fact are core slot facade tools.
# Run ./install.sh before using this profile so plugin tools are registered.
enabled = ["search", "read_file", "list_dir", "grep", "apply_patch", "write_file", "shell", "remember_fact"]

[permissions]
mode = "normal"

[module_config.policy.ask_write]
allow = ["search", "read_file", "list_dir", "grep"]
ask_before = ["apply_patch", "write_file", "shell", "remember_fact"]

[module_config.context.repo_aware]
providers = ["project_instructions", "manifest", "git_status", "repo_tree", "memory", "search"]
max_context_bytes = 60000
max_bytes_per_file = 8000
max_search_results = 50
memory_limit = 5
repo_tree_max_entries = 300
repo_tree_max_depth = 3
repo_tree_skip_entries = [".git", "target", "node_modules", ".agent", "sessions", "dist", "build", ".env", "secrets.json", "config.local.json"]
project_instruction_files = ["AGENTS.md", "CLAUDE.md", ".cursorrules"]
manifest_files = ["Cargo.toml", "package.json", "pyproject.toml", "go.mod", "pom.xml", "build.gradle", "composer.json"]

[app_server]
approval_timeout_ms = 300000

[runtime]
model_timeout_ms = 10800000
context_timeout_ms = 30000
workflow_timeout_ms = 14400000

[event_log]
path = ".agent/events.jsonl"
