<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Proteus</title>
        <script>
            window.MathJax = {
                tex: {
                    inlineMath: [
                        ["$", "$"],
                        ["\\(", "\\)"],
                    ],
                    displayMath: [
                        ["$$", "$$"],
                        ["\\[", "\\]"],
                    ],
                    processEscapes: true,
                },
                startup: {
                    ready: () => {
                        MathJax.startup.defaultReady();
                        window.proteusTypesetMath();
                    },
                },
            };
            window.__proteusMathPending = false;
            window.__proteusMathRunning = false;
            window.__proteusMathQueued = false;
            window.proteusTypesetMath = () => {
                if (window.__proteusMathPending) {
                    return;
                }
                window.__proteusMathPending = true;
                requestAnimationFrame(() => {
                    window.__proteusMathPending = false;
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        const root =
                            document.querySelector(".results-panel") ||
                            document.body;
                        const text = root.textContent || "";
                        if (!/[\\$]/.test(text)) {
                            return;
                        }
                        const wasAtBottom =
                            root.scrollHeight -
                                root.scrollTop -
                                root.clientHeight <=
                            64;
                        if (window.__proteusMathRunning) {
                            window.__proteusMathQueued = true;
                            return;
                        }
                        window.__proteusMathRunning = true;
                        window.MathJax.typesetPromise([root]).finally(() => {
                            if (wasAtBottom) {
                                root.scrollTop = root.scrollHeight;
                            }
                            window.__proteusMathRunning = false;
                            if (window.__proteusMathQueued) {
                                window.__proteusMathQueued = false;
                                window.proteusTypesetMath();
                            }
                        });
                    }
                });
            };
        </script>
        <script
            async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
        ></script>
        <script>
            // Стаб до загрузки mermaid ESM: последний вызов ставится в
            // очередь и выполняется, когда модуль ниже подменит функцию.
            window.__proteusMermaidQueue = null;
            window.proteusRenderMermaid = (id, code) => {
                window.__proteusMermaidQueue = { id, code };
            };
        </script>
        <script type="module">
            import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
            mermaid.initialize({
                startOnLoad: false,
                securityLevel: "strict",
                theme: "dark",
                flowchart: { useMaxWidth: false },
            });
            const render = async (id, code) => {
                const el = document.getElementById(id);
                if (!el) {
                    return;
                }
                try {
                    const slug =
                        "proteus-mmd-" +
                        Math.random().toString(36).slice(2, 10);
                    const { svg } = await mermaid.render(slug, code);
                    el.innerHTML = svg;
                    window.dispatchEvent(
                        new CustomEvent("proteus-mermaid-rendered", {
                            detail: id,
                        }),
                    );
                } catch (error) {
                    el.textContent = "Mermaid render failed: " + error;
                }
            };
            window.proteusRenderMermaid = render;
            if (window.__proteusMermaidQueue) {
                const queued = window.__proteusMermaidQueue;
                window.__proteusMermaidQueue = null;
                render(queued.id, queued.code);
            }
        </script>
        <link data-trunk rel="rust" data-wasm-opt="z" />
        <link data-trunk rel="css" href="css/tokens.css" />
        <link data-trunk rel="css" href="css/layout.css" />
        <link data-trunk rel="css" href="css/components.css" />
        <link data-trunk rel="css" href="css/markdown.css" />
        <link data-trunk rel="css" href="css/responsive.css" />
    </head>
    <body></body>
</html>
