<!doctype html>
<html lang="ru">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Proteus</title>
        <script>
            window.MathJax = {
                tex: {
                    inlineMath: [
                        ["$", "$"],
                        ["\\(", "\\)"],
                    ],
                    displayMath: [
                        ["$$", "$$"],
                        ["\\[", "\\]"],
                    ],
                    processEscapes: true,
                },
                startup: {
                    ready: () => {
                        MathJax.startup.defaultReady();
                        window.proteusTypesetMath();
                    },
                },
            };
            window.__proteusMathPending = false;
            window.__proteusMathRunning = false;
            window.__proteusMathQueued = false;
            window.proteusTypesetMath = () => {
                if (window.__proteusMathPending) {
                    return;
                }
                window.__proteusMathPending = true;
                requestAnimationFrame(() => {
                    window.__proteusMathPending = false;
                    if (window.MathJax && window.MathJax.typesetPromise) {
                        const root =
                            document.querySelector(".results-panel") ||
                            document.body;
                        const text = root.textContent || "";
                        if (!/[\\$]/.test(text)) {
                            return;
                        }
                        const wasAtBottom =
                            root.scrollHeight -
                                root.scrollTop -
                                root.clientHeight <=
                            64;
                        if (window.__proteusMathRunning) {
                            window.__proteusMathQueued = true;
                            return;
                        }
                        window.__proteusMathRunning = true;
                        window.MathJax.typesetPromise([root]).finally(() => {
                            if (wasAtBottom) {
                                root.scrollTop = root.scrollHeight;
                            }
                            window.__proteusMathRunning = false;
                            if (window.__proteusMathQueued) {
                                window.__proteusMathQueued = false;
                                window.proteusTypesetMath();
                            }
                        });
                    }
                });
            };
        </script>
        <script
            async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
        ></script>
        <script>
            // Делегированный обработчик действий в markdown code-блоках
            // (контент вставляется как inner_html, поэтому Leptos-хендлеры
            // к кнопкам не привязать).
            document.addEventListener("click", (event) => {
                const copyBtn = event.target.closest(".code-copy");
                if (copyBtn) {
                    const block = copyBtn.closest(".code-block");
                    const code = block && block.querySelector("pre code");
                    if (code && navigator.clipboard) {
                        navigator.clipboard.writeText(code.textContent || "");
                        const prev = copyBtn.textContent;
                        copyBtn.textContent = "copied";
                        copyBtn.classList.add("active");
                        setTimeout(() => {
                            copyBtn.textContent = prev;
                            copyBtn.classList.remove("active");
                        }, 1200);
                    }
                    return;
                }
                const wrapBtn = event.target.closest(".code-wrap");
                if (wrapBtn) {
                    const block = wrapBtn.closest(".code-block");
                    if (block) {
                        block.classList.toggle("nowrap");
                        wrapBtn.classList.toggle("active");
                    }
                }
            });
        </script>
        <link data-trunk rel="rust" data-wasm-opt="z" />
        <link data-trunk rel="css" href="css/tokens.css" />
        <link data-trunk rel="css" href="css/layout.css" />
        <link data-trunk rel="css" href="css/components.css" />
        <link data-trunk rel="css" href="css/markdown.css" />
        <link data-trunk rel="css" href="css/responsive.css" />
    </head>
    <body></body>
</html>
