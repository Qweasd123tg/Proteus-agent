include = "proteus.provider.example.toml"

[profile]
name = "dev-slim"

[modules]
# Slim profile for dogfooding Proteus itself. Keep this focused on the active
# coding-agent path; parked/research capabilities stay out of the hot surface.
workflow = "coding.single_loop"
search = "rg"
memory = "none"
memory_policy = "none"
context = "repo_aware"
policy = "ask_write"
patch = "direct"
compactor = "codex"
tool_exposure = "dynamic"
renderer = "statusline"

[tools]
enabled = ["search", "read_file", "list_dir", "find_files", "grep", "git_status", "git_diff", "request_user_input", "apply_patch", "shell"]

[permissions]
mode = "normal"

[module_config.policy.ask_write]
allow = ["search", "read_file", "list_dir", "find_files", "grep", "git_status", "git_diff", "request_user_input"]
ask_before = ["apply_patch", "shell"]

[module_config.compactor.codex]
trigger_fraction = 0.8

[module_config.tool_exposure.dynamic]
max_hot_tools = 8
always_include = ["request_user_input"]

[module_config.context.repo_aware]
providers = ["project_instructions", "manifest", "git_status", "repo_tree", "search"]
max_context_bytes = 25000
max_bytes_per_file = 5000
max_search_results = 15
repo_tree_max_entries = 160
repo_tree_max_depth = 3
repo_tree_skip_entries = [
  ".git",
  "target",
  "node_modules",
  ".proteus",
  "sessions",
  "dist",
  "build",
  "examples/source",
  "examples/research",
  "clients/web/target",
  "docs/memory-research.md",
  "docs/MODULAR_PROTEUS_SPEC_RU.md",
]
project_instruction_files = ["AGENTS.md", "CLAUDE.md", ".cursorrules"]
manifest_files = ["Cargo.toml", "package.json", "pyproject.toml", "go.mod", "pom.xml", "build.gradle", "composer.json"]

[app_server]
approval_timeout_ms = 0

[runtime]
model_timeout_ms = 10800000
context_timeout_ms = 30000
workflow_timeout_ms = 14400000

[event_log]
path = ".proteus/events.jsonl"
