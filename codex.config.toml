include = "proteus.provider.example.toml"

# Base prompt: адаптированный upstream Codex base prompt
# (codex-rs/protocol/src/prompts/base_instructions/default.md из исходников
# Codex). Divergence от upstream: identity line без "Codex CLI", убраны
# разделы update_plan/planning (нет такого tool) и sandbox pointer,
# apply_patch описан как freeform, permission-режимы названы по-нашему,
# добавлен совет предпочитать structured read/search tools в shell guidelines.
[[instructions]]
kind = "System"
file = "prompts/codex-default.md"
priority = 100

[profile]
name = "codex-experimental"

[modules]
# Experimental Codex-shaped profile. Keep this profile explicit so baseline
# coding profiles do not inherit Codex parity experiments by accident.
workflow = "coding.codex_loop_diagnostic"
search = "rg"
memory = "none"
memory_policy = "none"
context = "codex_context"
policy = "codex_policy"
patch = "direct"
compactor = "codex"
tool_exposure = "codex_dynamic"
renderer = "statusline"

[tools]
enabled = ["search", "read_file", "read_many_files", "list_dir", "find_files", "grep", "git_status", "git_diff", "request_user_input", "write_file", "shell", "remember_fact"]

[[tools.mcp_servers]]
name = "playwright"
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--headless", "--isolated", "--browser", "firefox", "--output-dir", ".playwright-mcp", "--output-mode", "stdout"]
safety = "Network"
timeout_ms = 60000
metadata = { scope = "browser-automation", category = "mcp", tags = ["mcp", "browser", "playwright", "desktop-app"] }

[[tools.configured]]
name = "apply_patch"
description = "Use the `apply_patch` tool to edit files. This is a FREEFORM tool, so do not wrap the patch in JSON."
safety = "WritesFiles"
timeout_ms = 10000
metadata = { hot = true, category = "patch", tags = ["workspace", "edit", "patch", "write"], aliases = ["apply changes", "edit files", "modify workspace"], format = "codex_apply_patch", approval = { cache_scopes = ["workspace_write"] } }

[tools.configured.surface]
kind = "freeform"

[tools.configured.surface.format]
type = "grammar"
syntax = "lark"
definition = '''
start: begin_patch hunk+ end_patch
begin_patch: "*** Begin Patch" LF
end_patch: "*** End Patch" LF?

hunk: add_hunk | delete_hunk | update_hunk
add_hunk: "*** Add File: " filename LF add_line+
delete_hunk: "*** Delete File: " filename LF
update_hunk: "*** Update File: " filename LF change_move? change?

filename: /(.+)/
add_line: "+" /(.*)/ LF -> line

change_move: "*** Move to: " filename LF
change: (change_context | change_line)+ eof_line?
change_context: ("@@" | "@@ " /(.+)/) LF
change_line: ("+" | "-" | " ") /(.*)/ LF
eof_line: "*** End of File" LF

%import common.LF
'''

[tools.configured.executor]
kind = "native"
handler = "apply_patch"

[permissions]
mode = "normal"

[module_config.policy.codex_policy]
allow = ["search", "read_file", "read_many_files", "list_dir", "find_files", "grep", "git_status", "git_diff", "request_user_input"]
ask_before = [
  "apply_patch",
  "write_file",
  "shell",
  "remember_fact",
  "playwright__browser_close",
  "playwright__browser_resize",
  "playwright__browser_console_messages",
  "playwright__browser_handle_dialog",
  "playwright__browser_evaluate",
  "playwright__browser_file_upload",
  "playwright__browser_drop",
  "playwright__browser_fill_form",
  "playwright__browser_press_key",
  "playwright__browser_type",
  "playwright__browser_navigate",
  "playwright__browser_navigate_back",
  "playwright__browser_network_requests",
  "playwright__browser_network_request",
  "playwright__browser_take_screenshot",
  "playwright__browser_snapshot",
  "playwright__browser_click",
  "playwright__browser_drag",
  "playwright__browser_hover",
  "playwright__browser_select_option",
  "playwright__browser_tabs",
  "playwright__browser_wait_for",
]
deny = ["playwright__browser_run_code_unsafe"]

[module_config.compactor.codex]
trigger_fraction = 0.8

[module_config.tool_exposure.codex_dynamic]
max_hot_tools = 10
always_include = ["request_user_input", "playwright__browser_navigate", "playwright__browser_snapshot"]

[module_config.context.codex_context]
providers = ["project_instructions", "git_status", "git_diff", "repo_tree", "manifest", "search"]
max_context_bytes = 60000
max_bytes_per_file = 12000
max_search_results = 40
repo_tree_max_entries = 300
repo_tree_max_depth = 4
git_diff_max_bytes = 16000
repo_tree_skip_entries = [
  ".git",
  "target",
  "node_modules",
  ".proteus",
  "sessions",
  "dist",
  "build",
  "examples/source",
  "examples/research",
  ".env",
  "secrets.json",
  "config.local.json",
]
project_instruction_files = ["AGENTS.override.md", "AGENTS.md", "CLAUDE.md", ".cursorrules"]
manifest_files = ["Cargo.toml", "package.json", "pyproject.toml", "go.mod", "pom.xml", "build.gradle", "composer.json", "README.md"]

[app_server]
approval_timeout_ms = 0

[runtime]
model_timeout_ms = 10800000
context_timeout_ms = 30000
workflow_timeout_ms = 14400000

[event_log]
path = ".proteus/events.jsonl"
