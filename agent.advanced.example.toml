[profile]
name = "advanced-external-tools"

[model]
provider = "fake"
model = "fake-tool-model"
stream = false

[modules]
workflow = "single_loop"
search = "null"
memory = "none"
memory_policy = "none"
context = "simple"
policy = "ask_write"
patch = "direct"
renderer = "statusline"

[renderer.statusline]
components = ["model", "context", "session"]
position = "bottom"
frame = "block"
separator = " | "
ansi = true

[tools]
enabled = []
# path omitted: defaults to the tools directory next to the config root.
# With the standard layout this is ~/.config/agent-qweasd123tg/tools.
# Keep policy.ask_write in sync with the names registered by those manifests.

[permissions]
mode = "normal"

[policy.ask_write]
ask_before = ["apply_patch", "write_file", "shell"]
allow = ["read_file", "list_dir", "search"]

[search.rg]
max_results = 50

[context.simple]
max_search_results = 50

[memory.jsonl]
path = ".agent/memory.jsonl"

[app_server]
approval_timeout_ms = 300000

[event_log]
path = ".agent/events.jsonl"
