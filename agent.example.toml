[profile]
name = "dev-basic"

[model]
provider = "fake"
model = "fake-tool-model"
stream = false

[modules]
workflow = "single_loop"
search = "null"
memory = "none"
memory_policy = "none"
context = "simple"
policy = "ask_write"
patch = "direct"
renderer = "statusline"

[module_config.renderer.statusline]
components = ["model", "context", "session"]
position = "bottom"
frame = "block"
separator = " | "
ansi = true

[module_config.renderer.statusline.model]
label = "model"
show_provider = true

[module_config.renderer.statusline.context]
label = "ctx"
max_tokens = 200000
bar_width = 10

[tools]
# Core-resident tools. File I/O and shell come from plugins:
# install file-tools and shell-tool into ~/.agent/plugins/ and extend this list.
enabled = ["apply_patch", "remember_fact", "search"]

[permissions]
mode = "normal"

[module_config.policy.ask_write]
ask_before = ["apply_patch", "remember_fact"]
allow = ["search"]

[module_config.search.rg]
max_results = 50

[module_config.context.simple]
max_search_results = 50

[module_config.context.repo_aware]
providers = ["project_instructions", "manifest", "git_status", "repo_tree", "memory", "search"]
max_context_bytes = 60000
max_bytes_per_file = 8000
max_search_results = 50
memory_limit = 5
repo_tree_max_entries = 300
repo_tree_max_depth = 3
repo_tree_skip_entries = [".git", "target", "node_modules", ".agent", "sessions", "dist", "build", ".env", "secrets.json", "config.local.json"]
project_instruction_files = ["AGENTS.md", "CLAUDE.md", ".cursorrules"]
manifest_files = ["Cargo.toml", "package.json", "pyproject.toml", "go.mod", "pom.xml", "build.gradle", "composer.json"]

[module_config.memory.jsonl]
path = ".agent/memory.jsonl"

[app_server]
approval_timeout_ms = 300000

[runtime]
model_timeout_ms = 120000
context_timeout_ms = 30000

[event_log]
path = ".agent/events.jsonl"
